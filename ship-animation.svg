<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 230" width="900">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#020510"/>
      <stop offset="80%" stop-color="#0a1f5c"/>
      <stop offset="100%" stop-color="#0d2a6e"/>
    </linearGradient>
    <linearGradient id="ocean" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a2040"/>
      <stop offset="100%" stop-color="#040d1a"/>
    </linearGradient>
    <linearGradient id="hull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#0a1f40"/>
    </linearGradient>
    <radialGradient id="beamGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00BFFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00BFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="moonGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="900" height="230" fill="url(#sky)"/>

  <!-- Stars -->
  <circle cx="30"  cy="15" r="1.2" fill="white"><animate attributeName="opacity" values="1;0.2;1" dur="2.1s" repeatCount="indefinite"/></circle>
  <circle cx="75"  cy="35" r="0.9" fill="white"><animate attributeName="opacity" values="0.6;1;0.6" dur="3.3s" repeatCount="indefinite"/></circle>
  <circle cx="130" cy="10" r="1.4" fill="#a0d8ef"><animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite"/></circle>
  <circle cx="195" cy="28" r="0.8" fill="white"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.7s" repeatCount="indefinite"/></circle>
  <circle cx="260" cy="12" r="1.1" fill="white"><animate attributeName="opacity" values="1;0.2;1" dur="3.1s" repeatCount="indefinite"/></circle>
  <circle cx="340" cy="22" r="0.9" fill="#a0d8ef"><animate attributeName="opacity" values="0.7;1;0.7" dur="2.4s" repeatCount="indefinite"/></circle>
  <circle cx="420" cy="8"  r="1.3" fill="white"><animate attributeName="opacity" values="1;0.3;1" dur="1.9s" repeatCount="indefinite"/></circle>
  <circle cx="500" cy="30" r="0.8" fill="white"><animate attributeName="opacity" values="0.5;1;0.5" dur="3.5s" repeatCount="indefinite"/></circle>
  <circle cx="580" cy="14" r="1.0" fill="#a0d8ef"><animate attributeName="opacity" values="1;0.2;1" dur="2.2s" repeatCount="indefinite"/></circle>
  <circle cx="660" cy="25" r="1.2" fill="white"><animate attributeName="opacity" values="0.6;1;0.6" dur="2.8s" repeatCount="indefinite"/></circle>
  <circle cx="730" cy="10" r="0.9" fill="white"><animate attributeName="opacity" values="1;0.4;1" dur="3.0s" repeatCount="indefinite"/></circle>
  <circle cx="800" cy="32" r="1.1" fill="#a0d8ef"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="2.5s" repeatCount="indefinite"/></circle>
  <circle cx="860" cy="18" r="1.3" fill="white"><animate attributeName="opacity" values="1;0.3;1" dur="1.7s" repeatCount="indefinite"/></circle>
  <circle cx="45"  cy="55" r="0.7" fill="white"><animate attributeName="opacity" values="0.5;1;0.5" dur="4.0s" repeatCount="indefinite"/></circle>
  <circle cx="310" cy="48" r="0.8" fill="#a0d8ef"><animate attributeName="opacity" values="1;0.2;1" dur="2.6s" repeatCount="indefinite"/></circle>
  <circle cx="750" cy="42" r="0.9" fill="white"><animate attributeName="opacity" values="0.7;1;0.7" dur="3.2s" repeatCount="indefinite"/></circle>

  <!-- Moon -->
  <circle cx="820" cy="45" r="22" fill="#d0e8ff" filter="url(#moonGlow)" opacity="0.85"/>
  <circle cx="828" cy="40" r="18" fill="#0a1f5c"/>
  <!-- Moon reflection on water -->
  <rect x="800" y="165" width="40" height="60" fill="url(#beamGlow)" opacity="0.08"/>

  <!-- Ocean -->
  <rect x="0" y="162" width="900" height="68" fill="url(#ocean)"/>

  <!-- Wave 1 -->
  <path d="M-225,168 Q-112,160 0,168 Q112,176 225,168 Q337,160 450,168 Q562,176 675,168 Q787,160 900,168 Q1012,176 1125,168" fill="none" stroke="#00BFFF" stroke-width="1.5" stroke-opacity="0.35">
    <animateTransform attributeName="transform" type="translate" values="0,0;225,0;0,0" dur="5s" repeatCount="indefinite"/>
  </path>
  <!-- Wave 2 -->
  <path d="M-112,174 Q0,167 112,174 Q225,181 337,174 Q450,167 562,174 Q675,181 787,174 Q900,167 1012,174" fill="none" stroke="#14b8a6" stroke-width="1" stroke-opacity="0.25">
    <animateTransform attributeName="transform" type="translate" values="112,0;0,0;112,0" dur="7s" repeatCount="indefinite"/>
  </path>
  <!-- Wave 3 subtle -->
  <path d="M0,178 Q150,172 300,178 Q450,184 600,178 Q750,172 900,178" fill="none" stroke="#00BFFF" stroke-width="0.8" stroke-opacity="0.15">
    <animateTransform attributeName="transform" type="translate" values="0,0;-150,0;0,0" dur="9s" repeatCount="indefinite"/>
  </path>

  <!-- ========== SHIP ========== -->

  <!-- Hull main body -->
  <path d="M100,155 L800,155 L780,185 L110,185 L85,172 Z" fill="url(#hull)"/>
  <!-- Hull waterline accent stripe -->
  <rect x="90" y="155" width="700" height="6" fill="#00BFFF" opacity="0.35"/>
  <!-- Rust/paint lower hull -->
  <path d="M110,178 L780,178 L770,185 L120,185 Z" fill="#0d1f35"/>

  <!-- Main deck -->
  <rect x="105" y="128" width="670" height="27" fill="#0a1a35" rx="1"/>

  <!-- Bow shape (right/front) -->
  <path d="M775,155 L830,178 L780,185 Z" fill="#0d2040"/>

  <!-- Stern flat (left/back) -->
  <rect x="100" y="130" width="15" height="55" fill="#081528" rx="1"/>

  <!-- ---- Cargo containers ---- -->
  <!-- Row 2 (top) -->
  <rect x="145" y="93"  width="42" height="17" fill="#c0392b" rx="1.5"/>
  <rect x="192" y="93"  width="42" height="17" fill="#2980b9" rx="1.5"/>
  <rect x="239" y="93"  width="42" height="17" fill="#27ae60" rx="1.5"/>
  <rect x="286" y="93"  width="42" height="17" fill="#f39c12" rx="1.5"/>
  <rect x="333" y="93"  width="42" height="17" fill="#8e44ad" rx="1.5"/>
  <rect x="380" y="93"  width="42" height="17" fill="#c0392b" rx="1.5"/>
  <rect x="427" y="93"  width="42" height="17" fill="#16a085" rx="1.5"/>
  <rect x="474" y="93"  width="42" height="17" fill="#2980b9" rx="1.5"/>
  <!-- Row 1 (bottom) -->
  <rect x="145" y="111" width="42" height="17" fill="#2980b9" rx="1.5"/>
  <rect x="192" y="111" width="42" height="17" fill="#27ae60" rx="1.5"/>
  <rect x="239" y="111" width="42" height="17" fill="#e74c3c" rx="1.5"/>
  <rect x="286" y="111" width="42" height="17" fill="#8e44ad" rx="1.5"/>
  <rect x="333" y="111" width="42" height="17" fill="#f39c12" rx="1.5"/>
  <rect x="380" y="111" width="42" height="17" fill="#16a085" rx="1.5"/>
  <rect x="427" y="111" width="42" height="17" fill="#c0392b" rx="1.5"/>
  <rect x="474" y="111" width="42" height="17" fill="#2980b9" rx="1.5"/>
  <!-- Container edges / lines -->
  <line x1="145" y1="93" x2="516" y2="93"   stroke="#000" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="145" y1="111" x2="516" y2="111"  stroke="#000" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="145" y1="128" x2="516" y2="128"  stroke="#000" stroke-width="0.5" stroke-opacity="0.3"/>

  <!-- ---- Crane / derrick arm ---- -->
  <line x1="160" y1="128" x2="160" y2="68"   stroke="#1a3a5c" stroke-width="3"/>
  <line x1="160" y1="85"  x2="215" y2="68"   stroke="#1a3a5c" stroke-width="2"/>
  <line x1="215" y1="68"  x2="215" y2="93"   stroke="#1a3a5c" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- ---- Bridge / Superstructure ---- -->
  <!-- Base block -->
  <rect x="545" y="82"  width="150" height="73" fill="#0d2040" rx="3"/>
  <!-- Windows row 1 -->
  <rect x="554" y="92"  width="14" height="9" fill="#00BFFF" opacity="0.9" rx="1"/>
  <rect x="573" y="92"  width="14" height="9" fill="#00BFFF" opacity="0.9" rx="1"/>
  <rect x="592" y="92"  width="14" height="9" fill="#00BFFF" opacity="0.9" rx="1"/>
  <rect x="611" y="92"  width="14" height="9" fill="#00BFFF" opacity="0.9" rx="1"/>
  <rect x="630" y="92"  width="14" height="9" fill="#a0d8ef" opacity="0.7" rx="1"/>
  <rect x="649" y="92"  width="14" height="9" fill="#a0d8ef" opacity="0.7" rx="1"/>
  <rect x="668" y="92"  width="14" height="9" fill="#00BFFF" opacity="0.9" rx="1"/>
  <!-- Windows row 2 -->
  <rect x="554" y="107" width="14" height="9" fill="#14b8a6" opacity="0.8" rx="1"/>
  <rect x="573" y="107" width="14" height="9" fill="#14b8a6" opacity="0.8" rx="1"/>
  <rect x="592" y="107" width="14" height="9" fill="#a0d8ef" opacity="0.6" rx="1"/>
  <rect x="611" y="107" width="14" height="9" fill="#14b8a6" opacity="0.8" rx="1"/>
  <rect x="630" y="107" width="14" height="9" fill="#a0d8ef" opacity="0.6" rx="1"/>
  <rect x="649" y="107" width="14" height="9" fill="#14b8a6" opacity="0.8" rx="1"/>
  <rect x="668" y="107" width="14" height="9" fill="#14b8a6" opacity="0.8" rx="1"/>
  <!-- Window glow pulse -->
  <rect x="554" y="92" width="128" height="9" fill="#00BFFF" opacity="0" rx="1">
    <animate attributeName="opacity" values="0;0.15;0" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Bridge top level (wing) -->
  <rect x="540" y="68" width="165" height="18" fill="#0a1a35" rx="2"/>
  <!-- Wing windows -->
  <rect x="548" y="72" width="10" height="7" fill="#00ff88" opacity="0.9" rx="1"/>
  <rect x="561" y="72" width="10" height="7" fill="#00ff88" opacity="0.9" rx="1"/>
  <rect x="680" y="72" width="10" height="7" fill="#00ff88" opacity="0.9" rx="1"/>
  <rect x="693" y="72" width="10" height="7" fill="#00ff88" opacity="0.9" rx="1"/>

  <!-- ---- Funnel / Exhaust ---- -->
  <rect x="655" y="35" width="30" height="40" fill="#0d2040" rx="3"/>
  <rect x="651" y="32" width="38" height="8"  fill="#081528" rx="2"/>
  <!-- Funnel stripe (company color) -->
  <rect x="651" y="38" width="38" height="6" fill="#00BFFF" opacity="0.6"/>
  <!-- Exhaust smoke -->
  <ellipse cx="670" cy="26" rx="5" ry="5" fill="#1a2a3a" opacity="0.7">
    <animate attributeName="cy" values="26;10;-5" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.4;0" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="rx" values="5;9;13" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="5;8;12" dur="3s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="665" cy="20" rx="4" ry="4" fill="#1a2a3a" opacity="0.5">
    <animate attributeName="cy" values="20;4;-12" dur="3s" repeatCount="indefinite" begin="0.8s"/>
    <animate attributeName="opacity" values="0.5;0.2;0" dur="3s" repeatCount="indefinite" begin="0.8s"/>
    <animate attributeName="rx" values="4;8;12" dur="3s" repeatCount="indefinite" begin="0.8s"/>
  </ellipse>

  <!-- ---- Mast / Radar ---- -->
  <line x1="620" y1="68" x2="620" y2="38" stroke="#2a5a8a" stroke-width="2"/>
  <!-- Radar dish -->
  <ellipse cx="620" cy="36" rx="10" ry="4" fill="none" stroke="#14b8a6" stroke-width="1.5">
    <animateTransform attributeName="transform" type="rotate" values="0 620 36;360 620 36" dur="3s" repeatCount="indefinite"/>
  </ellipse>

  <!-- ========== ILLUMINATION FLASH — Navigation light ========== -->
  <!-- Light source on mast -->
  <circle cx="160" cy="66" r="5" fill="#00ff88" filter="url(#strongGlow)">
    <animate attributeName="opacity" values="1;1;0.1;1;1;0.1;1" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="r" values="5;7;5;7;5;3;5" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Expanding ring pulse — wave 1 -->
  <circle cx="160" cy="66" r="5" fill="none" stroke="#00ff88" stroke-width="2.5" opacity="0">
    <animate attributeName="r" values="5;55;100" dur="3s" repeatCount="indefinite" begin="0s"/>
    <animate attributeName="opacity" values="0.9;0.4;0" dur="3s" repeatCount="indefinite" begin="0s"/>
    <animate attributeName="stroke-width" values="2.5;1.5;0.5" dur="3s" repeatCount="indefinite" begin="0s"/>
  </circle>
  <!-- Ring 2 -->
  <circle cx="160" cy="66" r="5" fill="none" stroke="#00BFFF" stroke-width="2" opacity="0">
    <animate attributeName="r" values="5;55;100" dur="3s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="opacity" values="0.8;0.3;0" dur="3s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="stroke-width" values="2;1;0.3" dur="3s" repeatCount="indefinite" begin="1s"/>
  </circle>
  <!-- Ring 3 -->
  <circle cx="160" cy="66" r="5" fill="none" stroke="#00ff88" stroke-width="1.5" opacity="0">
    <animate attributeName="r" values="5;55;100" dur="3s" repeatCount="indefinite" begin="2s"/>
    <animate attributeName="opacity" values="0.7;0.25;0" dur="3s" repeatCount="indefinite" begin="2s"/>
  </circle>

  <!-- Starboard light (right bow - red) -->
  <circle cx="810" cy="158" r="3.5" fill="#ff4444" filter="url(#softGlow)">
    <animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Stern light (white) -->
  <circle cx="105" cy="150" r="3" fill="white" filter="url(#softGlow)">
    <animate attributeName="opacity" values="1;0.3;1" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Water reflection of flash light -->
  <ellipse cx="160" cy="175" rx="30" ry="8" fill="#00ff88" opacity="0.1">
    <animate attributeName="opacity" values="0.1;0.05;0.1;0.05;0.1;0.02;0.1" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="rx" values="30;50;30" dur="3s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Moon water reflection -->
  <ellipse cx="820" cy="175" rx="18" ry="5" fill="#d0e8ff" opacity="0.12">
    <animate attributeName="rx" values="18;25;18" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.12;0.06;0.12" dur="5s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Ship gentle bob -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-2;0,0;0,1;0,0" dur="6s" repeatCount="indefinite"/>
  </g>

  <!-- Bottom label -->
  <text x="450" y="222" text-anchor="middle" font-family="Roboto, monospace" font-size="11" fill="#00BFFF" opacity="0.55" letter-spacing="3">
    ⚓  S U J I K U M A R . C O M  ·  D I G I T A L  M A R I T I M E  E N G I N E E R  ⚓
  </text>
</svg>
